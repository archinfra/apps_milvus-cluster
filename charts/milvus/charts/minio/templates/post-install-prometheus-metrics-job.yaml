{{- if or .Values.metrics.serviceMonitor.enabled .Values.metrics.podMonitor.enabled }}
{{- $fullName := include "minio.fullname" . -}}
{{ $scheme := "http" }}
{{- if .Values.tls.enabled }}
{{ $scheme = "https" }}
{{ end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullName }}-update-prometheus-secret
  labels:
    app: {{ template "minio.name" . }}-update-prometheus-secret
    chart: {{ template "minio.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
  {{ toYaml .Values.updatePrometheusJob.annotations | indent 4 }}
spec:
  template:
    metadata:
      labels:
        app: {{ template "minio.name" . }}-update-prometheus-secret
        release: {{ .Release.Name }}
{{- if .Values.podLabels }}
{{ toYaml .Values.podLabels | indent 8 }}
{{- end }}
{{- if .Values.updatePrometheusJob.podAnnotations }}
      annotations:
{{ toYaml .Values.updatePrometheusJob.podAnnotations | indent 8 }}
{{- end }}
    spec:
{{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ $fullName }}-update-prometheus-secret
{{- end }}
      restartPolicy: OnFailure
{{- include "minio.imagePullSecrets" . | indent 6 }}
{{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
{{- if .Values.updatePrometheusJob.securityContext.enabled }}
      securityContext:
        runAsUser: {{ .Values.updatePrometheusJob.securityContext.runAsUser }}
        runAsGroup: {{ .Values.updatePrometheusJob.securityContext.runAsGroup }}
        fsGroup: {{ .Values.updatePrometheusJob.securityContext.fsGroup }}
{{- end }}
      volumes:
        - name: workdir
          emptyDir: {}
      initContainers:
        - name: minio-mc
          image: "{{ .Values.mcImage.repository }}:{{ .Values.mcImage.tag }}"
          imagePullPolicy: {{ .Values.mcImage.pullPolicy }}
          command:
            - /bin/sh
            - "-c"
            - mc --config-dir {{ .Values.configPathmc }} admin prometheus generate target --json --no-color -q > /workdir/mc.json
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ template "minio.secretName" . }}
                  key: accesskey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ template "minio.secretName" . }}
                  key: secretkey
            #  mc admin prometheus generate don't really connect to remote server, TLS cert isn't required
            - name: MC_HOST_target
              value: {{ $scheme }}://$(MINIO_ACCESS_KEY):$(MINIO_SECRET_KEY)@{{ $fullName }}:{{ .Values.service.port }}
          volumeMounts:
            - name: workdir
              mountPath: /workdir
          resources:
{{ toYaml .Values.resources | indent 12 }}
        # extract bearerToken from mc admin output
        - name: token-extract
          image: "{{ .Values.kubectlImage.repository }}:{{ .Values.kubectlImage.tag }}"
          imagePullPolicy: {{ .Values.kubectlImage.pullPolicy }}
          command:
            - /bin/sh
            - "-c"
            - |
              token="$(sed -n 's/.*"bearerToken"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /workdir/mc.json | head -n 1)"
              [ -n "$token" ] || { echo "failed to extract bearerToken from mc output"; exit 1; }
              printf '%s' "$token" > /workdir/token
          volumeMounts:
            - name: workdir
              mountPath: /workdir
          resources:
{{ toYaml .Values.resources | indent 12 }}
        - name: kubectl-create
          image: "{{ .Values.kubectlImage.repository }}:{{ .Values.kubectlImage.tag }}"
          imagePullPolicy: {{ .Values.kubectlImage.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            {{- if and .Values.metrics.serviceMonitor.enabled .Values.metrics.podMonitor.enabled }}
            - |
              set -eu
              mkdir -p /workdir/secrets
              create_secret_manifest() {
                resource_kind="$1"
                resource_name="$2"
                secret_name="$3"
                output_path="$4"
                namespace="$(kubectl -n {{ .Release.Namespace }} get "${resource_kind}" "${resource_name}" -o jsonpath='{.metadata.namespace}')"
                app_label="$(kubectl -n {{ .Release.Namespace }} get "${resource_kind}" "${resource_name}" -o jsonpath='{.metadata.labels.app}')"
                release_label="$(kubectl -n {{ .Release.Namespace }} get "${resource_kind}" "${resource_name}" -o jsonpath='{.metadata.labels.release}')"
                owner_uid="$(kubectl -n {{ .Release.Namespace }} get "${resource_kind}" "${resource_name}" -o jsonpath='{.metadata.uid}')"
                owner_api="$(kubectl -n {{ .Release.Namespace }} get "${resource_kind}" "${resource_name}" -o jsonpath='{.apiVersion}')"
                owner_kind="$(kubectl -n {{ .Release.Namespace }} get "${resource_kind}" "${resource_name}" -o jsonpath='{.kind}')"
                token_b64="$(base64 < /workdir/token | tr -d '\n')"
                cat > "${output_path}" <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: ${secret_name}
                namespace: ${namespace}
                labels:
                  app: ${app_label}
                  release: ${release_label}
                ownerReferences:
                - apiVersion: ${owner_api}
                  kind: ${owner_kind}
                  blockOwnerDeletion: true
                  controller: true
                  uid: ${owner_uid}
                  name: ${resource_name}
              type: Opaque
              data:
                token: ${token_b64}
              EOF
              }
              create_secret_manifest servicemonitor {{ $fullName }} {{ $fullName }}-servicemonitor-prometheus /workdir/secrets/servicemonitorobject.yaml
              create_secret_manifest podmonitor {{ $fullName }} {{ $fullName }}-podmonitor-prometheus /workdir/secrets/podmonitorobject.yaml
            {{- else if .Values.metrics.podMonitor.enabled }}
            - |
              set -eu
              mkdir -p /workdir/secrets
              namespace="$(kubectl -n {{ .Release.Namespace }} get podmonitor {{ $fullName }} -o jsonpath='{.metadata.namespace}')"
              app_label="$(kubectl -n {{ .Release.Namespace }} get podmonitor {{ $fullName }} -o jsonpath='{.metadata.labels.app}')"
              release_label="$(kubectl -n {{ .Release.Namespace }} get podmonitor {{ $fullName }} -o jsonpath='{.metadata.labels.release}')"
              owner_uid="$(kubectl -n {{ .Release.Namespace }} get podmonitor {{ $fullName }} -o jsonpath='{.metadata.uid}')"
              owner_api="$(kubectl -n {{ .Release.Namespace }} get podmonitor {{ $fullName }} -o jsonpath='{.apiVersion}')"
              owner_kind="$(kubectl -n {{ .Release.Namespace }} get podmonitor {{ $fullName }} -o jsonpath='{.kind}')"
              token_b64="$(base64 < /workdir/token | tr -d '\n')"
              cat > /workdir/secrets/podmonitorobject.yaml <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{ $fullName }}-podmonitor-prometheus
                namespace: ${namespace}
                labels:
                  app: ${app_label}
                  release: ${release_label}
                ownerReferences:
                - apiVersion: ${owner_api}
                  kind: ${owner_kind}
                  blockOwnerDeletion: true
                  controller: true
                  uid: ${owner_uid}
                  name: {{ $fullName }}
              type: Opaque
              data:
                token: ${token_b64}
              EOF
            {{- else if .Values.metrics.serviceMonitor.enabled }}
            - |
              set -eu
              mkdir -p /workdir/secrets
              namespace="$(kubectl -n {{ .Release.Namespace }} get servicemonitor {{ $fullName }} -o jsonpath='{.metadata.namespace}')"
              app_label="$(kubectl -n {{ .Release.Namespace }} get servicemonitor {{ $fullName }} -o jsonpath='{.metadata.labels.app}')"
              release_label="$(kubectl -n {{ .Release.Namespace }} get servicemonitor {{ $fullName }} -o jsonpath='{.metadata.labels.release}')"
              owner_uid="$(kubectl -n {{ .Release.Namespace }} get servicemonitor {{ $fullName }} -o jsonpath='{.metadata.uid}')"
              owner_api="$(kubectl -n {{ .Release.Namespace }} get servicemonitor {{ $fullName }} -o jsonpath='{.apiVersion}')"
              owner_kind="$(kubectl -n {{ .Release.Namespace }} get servicemonitor {{ $fullName }} -o jsonpath='{.kind}')"
              token_b64="$(base64 < /workdir/token | tr -d '\n')"
              cat > /workdir/secrets/servicemonitorobject.yaml <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{ $fullName }}-servicemonitor-prometheus
                namespace: ${namespace}
                labels:
                  app: ${app_label}
                  release: ${release_label}
                ownerReferences:
                - apiVersion: ${owner_api}
                  kind: ${owner_kind}
                  blockOwnerDeletion: true
                  controller: true
                  uid: ${owner_uid}
                  name: {{ $fullName }}
              type: Opaque
              data:
                token: ${token_b64}
              EOF
            {{- end }}
          volumeMounts:
            - name: workdir
              mountPath: /workdir
          resources:
{{ toYaml .Values.resources | indent 12 }}
      containers:
        - name: kubectl-apply
          image: "{{ .Values.kubectlImage.repository }}:{{ .Values.kubectlImage.tag }}"
          imagePullPolicy: {{ .Values.kubectlImage.pullPolicy }}
          command:
            - kubectl
            - apply
            - "-f"
            - /workdir/secrets
          volumeMounts:
            - name: workdir
              mountPath: /workdir
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- end }}
